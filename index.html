<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="app-version" content="3.2.2">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Team Yabee Grooming Dashboard</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
<link rel="stylesheet" href="style.css" id="appStylesheet">
</head>

<body>

<div class="app">

<aside class="sidebar">
<div class="brand">
<div class="logo">
<img src="https://alloftrl.us.to/tyk/_assets/media/32492aa48383cb1971b62dd63e1cc990.png" alt="Team Yabee Grooming">
</div>
<div>
<h2>Team Yabee Grooming</h2>
<p class="muted">DASHBOARD</p>
</div>
</div>

<div class="nav">
<button class="tab active" data-tab="dashboard">MAIN DASHBOARD</button>
<button class="tab" data-tab="pets">ALL PETS</button>
<button class="tab" data-tab="grooming">GROOMING</button>
<button class="tab" data-tab="hotel">HOTEL</button>
</div>

<div class="sidebar-bottom">
<div id="updateStatus" class="update-status" hidden></div>
<div id="backupStatus" class="backup-status"></div>
<button class="settings-toggle" id="settingsToggle" type="button" aria-expanded="false" onclick="toggleSettingsMenu()">
<span class="material-symbols-outlined settings-icon" aria-hidden="true">settings</span>
<span>SETTINGS</span>
</button>
</div>
</aside>

<main class="main">

<div class="top" id="topBar">
<div class="actions">
<button class="btn action-wide" onclick="openGroom()"><span class="action-plus">+</span><span class="action-label">GROOM</span></button>
<button class="btn action-wide" onclick="openHotel()"><span class="action-plus">+</span><span class="action-label">HOTEL</span></button>
</div>
</div>

<section class="section active" id="dashboard">
<div class="stats-stack">
  <div class="grid stats-grid-2">
    <div class="card stat-card"><div class="muted">GROOMING PETS TODAY</div><div class="stat" id="statGroomToday">0</div></div>
    <div class="card stat-card"><div class="muted">HOTEL PETS TODAY</div><div class="stat" id="statHotelToday">0</div></div>
  </div>
  <div class="grid stats-grid-3">
    <div class="card stat-card stat-card--small"><div class="muted">TOTAL PETS</div><div class="stat" id="statPets">0</div></div>
    <div class="card stat-card stat-card--small"><div class="muted">GROOMING PETS</div><div class="stat" id="statGroom">0</div></div>
    <div class="card stat-card stat-card--small"><div class="muted">HOTEL PETS</div><div class="stat" id="statHotel">0</div></div>
  </div>
</div>
</section>

<section class="section" id="pets">
<input class="search" id="petSearch" placeholder="SEARCH PETS...">
<div class="list" id="petsList"></div>
</section>

<section class="section" id="grooming">
<input class="search" id="groomSearch" placeholder="SEARCH GROOMING...">
<div class="list" id="groomList"></div>
</section>

<section class="section" id="hotel">
<input class="search" id="hotelSearch" placeholder="SEARCH HOTEL...">
<div class="list" id="hotelList"></div>
</section>

</main>
</div>

<div class="modal" id="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<input type="file" hidden id="importFile" accept=".json">
<div id="saveNotification">AUTO-SAVED</div>

<script>
(() => {
  const version = document.querySelector('meta[name="app-version"]')?.content?.trim() || Date.now().toString();
  const stylesheet = document.getElementById('appStylesheet');
  if (stylesheet) stylesheet.href = `style.css?v=${encodeURIComponent(version)}`;

  const script = document.createElement('script');
  script.src = `script.js?v=${encodeURIComponent(version)}`;
  document.body.appendChild(script);
})();
</script>
</body>
</html>
